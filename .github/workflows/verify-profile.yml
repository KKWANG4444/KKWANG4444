name: Verify profile matrix

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Verify brand and repository entry points
        shell: bash
        run: |
          set -euo pipefail
          test -f README.md
          test -f assets/social-preview.png
          test -f assets/social-preview.svg
          grep -Fq 'https://www.aifast.club/' README.md
          grep -Fq 'https://gitee.com/kkwwww4444' README.md
          grep -Fq 'AI-API-Stability-Tracker' README.md
          grep -Fq 'aifast-developer-hub' README.md
          grep -Fq 'https://docs.aifast.club/model-check/' README.md
          grep -Fq 'https://docs.aifast.club/start/' README.md
          grep -Fq 'https://docs.aifast.club/tools/codex/' README.md
          grep -Fq 'https://docs.aifast.club/troubleshooting/codex-gateway-checklist/' README.md
          grep -Fq 'https://docs.aifast.club/guides/model-check-report-guide/' README.md
          grep -Fq 'https://docs.aifast.club/go/register/?source=github&placement=' README.md
          grep -Fq 'https://docs.aifast.club/en/payment/?utm_source=github' README_EN.md
          grep -Fq 'utm_campaign=international-payment' README_EN.md
          ! grep -Fq 'www.aifast.club/register?channel=' README.md
          ! grep -Fq 'www.aifast.club/register?channel=' README_EN.md
          grep -Fq 'register?channel=c_zfxp7cp4' llms.txt
          grep -Fq 'register?channel=c_zfxp7cp4' llms-full.txt
          ! grep -Fq 'register?channel=c_uoqg7aoy' llms.txt
          ! grep -Fq 'register?channel=c_uoqg7aoy' llms-full.txt
          grep -Fq 'openai-compatible-api-check' README.md
          grep -Fq 'openai-compatible-api-check/blob/main/README_EN.md' README_EN.md
          grep -Fq 'https://docs.aifast.club/start/' llms.txt
          grep -Fq 'https://docs.aifast.club/start/' llms-full.txt
          grep -Fq 'https://docs.aifast.club/tools/codex/' llms.txt
          grep -Fq 'https://docs.aifast.club/troubleshooting/codex-gateway-checklist/' llms-full.txt
          ! grep -Fq 'openai-compatible-api-check' llms.txt
          ! grep -Fq 'openai-compatible-api-check' llms-full.txt
          grep -Fq 'ai-api-proxy-china-guide' README.md
          grep -Fq 'llm-api-proxy-china' README.md
